name: CI

on:
  push:
    branches:
      - automated/mvp-final
  pull_request:
    branches:
      - automated/mvp-final

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run tests
        run: |
          pytest -q
      - name: Lint (pyflakes)
        run: |
          python -m pip install pyflakes
          python -m pyflakes vulnez || true

  build-binary:
    if: github.ref == 'refs/heads/automated/mvp-final'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"
      - name: Install build deps
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller==5.13.0
      - name: Build binary
        run: |
          chmod +x build_binary.sh
          ./build_binary.sh
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: vulnez-linux
          path: dist/
